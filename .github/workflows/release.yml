name: Build & Release HEROES-WORLD

on:
  push:
    branches: [ main, master ]

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Lire la version
        id: v
        shell: bash
        run: echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: La release existe deja ?
        id: tag
        shell: bash
        run: |
          if git ls-remote --tags origin "refs/tags/v${{ steps.v.outputs.version }}" | grep -q "v${{ steps.v.outputs.version }}"; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up JDK 21
        if: steps.tag.outputs.exists == 'false'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        if: steps.tag.outputs.exists == 'false'
        uses: gradle/actions/setup-gradle@v3

      - name: Compiler le mod (menu en jeu)
        if: steps.tag.outputs.exists == 'false'
        shell: bash
        run: |
          if [ -f mod/build.gradle ]; then
            (cd mod && gradle --no-daemon build) || echo "::warning::compilation mod echouee -> jar existant conserve"
            jar=$(ls mod/build/libs/*.jar 2>/dev/null | grep -v sources | head -1 || true)
            if [ -n "$jar" ]; then cp "$jar" resources/mods/heroworld-titlescreen-1.0.0.jar && echo "mod recompile: $jar"; fi
          fi

      - name: Install
        if: steps.tag.outputs.exists == 'false'
        run: npm install --no-audit --no-fund

      - name: Build & Publish
        if: steps.tag.outputs.exists == 'false'
        run: npm run release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
