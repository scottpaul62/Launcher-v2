name: Build & Release HEROES-WORLD

on:
  push:
    branches: [ main, master ]

permissions:
  contents: write

jobs:
  release:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Lire la version
        id: v
        shell: bash
        run: echo "version=$(node -p "require('./package.json').version")" >> "$GITHUB_OUTPUT"

      - name: La release existe deja ?
        id: tag
        shell: bash
        run: |
          if git ls-remote --tags origin "refs/tags/v${{ steps.v.outputs.version }}" | grep -q "v${{ steps.v.outputs.version }}"; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up JDK 21
        if: steps.tag.outputs.exists == 'false'
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Set up Gradle
        if: steps.tag.outputs.exists == 'false'
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.7'

      - name: Compiler le mod (menu en jeu)
        if: steps.tag.outputs.exists == 'false'
        shell: bash
        run: |
          echo "gradle : $(gradle --version | grep Gradle || echo introuvable)"
          if (cd mod && gradle --no-daemon build --stacktrace); then
            jar=$(ls mod/build/libs/*.jar 2>/dev/null | grep -v sources | head -1)
            if [ -n "$jar" ]; then
              cp "$jar" resources/mods/heroworld-titlescreen-1.0.0.jar
              echo "✅ mod recompilé et copié : $jar"
            else
              echo "::warning::build OK mais aucun .jar trouvé -> ancien jar conservé"
            fi
          else
            echo "::warning::❌ compilation du mod ÉCHOUÉE -> ancien menu conservé (lancer Compiler-Mod.bat en local pour voir l'erreur)"
          fi

      - name: Install
        if: steps.tag.outputs.exists == 'false'
        run: npm install --no-audit --no-fund

      - name: Build & Publish
        if: steps.tag.outputs.exists == 'false'
        run: npm run release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-data:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generer le manifest (hash sha1 par fichier)
        run: python3 scripts/make-manifest.py

      - name: Publier data/ vers Cloudflare R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          AWS_DEFAULT_REGION: auto
          R2_ENDPOINT: https://883972267fd9e125b3d89186ff61bca1.r2.cloudflarestorage.com
        run: |
          if [ -z "$AWS_ACCESS_KEY_ID" ]; then
            echo "::notice::secrets R2 absents -> publication data/ ignoree"
            exit 0
          fi
          aws s3 sync data/ "s3://heroworld-data/" --endpoint-url "$R2_ENDPOINT" --delete \
            --cache-control "public, max-age=300"
          echo "✅ data/ publie sur R2 (les clients le recevront a leur prochain demarrage)"
